version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: plusultra-postgres
    environment:
      POSTGRES_DB: plusultra
      POSTGRES_USER: plusultra
      POSTGRES_PASSWORD: plusultra_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plusultra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: plusultra-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Neo4j Graph Database (for TCI)
  neo4j:
    image: neo4j:5-community
    container_name: plusultra-neo4j
    environment:
      NEO4J_AUTH: neo4j/plusultra_dev_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p plusultra_dev_password 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # PlusUltra Backend API
  backend:
    build:
      context: ./plusultra/backend
      dockerfile: Dockerfile
    container_name: plusultra-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://plusultra:plusultra_dev_password@postgres:5432/plusultra
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: plusultra_dev_password
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      WORKSPACE_BASE_PATH: /tmp/plusultra-workspaces
    ports:
      - "3000:3000"
      - "3001-3100:3001-3100"  # Port range for workspace previews
    volumes:
      - ./plusultra/backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for sandbox
      - workspace_data:/tmp/plusultra-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: npm run dev

  # Nginx Reverse Proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: plusultra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  workspace_data:
    driver: local

networks:
  default:
    name: plusultra-network
